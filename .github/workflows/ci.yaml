name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel any in-progress run on the same branch when a new push arrives.
# This avoids wasting CI minutes on outdated commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type check, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras

      # Ruff checks two things in one pass:
      #   - style and formatting (replaces black + isort + flake8)
      #   - common bugs (undefined names, unused imports, etc.)
      # We run --check so it exits with a non-zero code if anything is wrong
      # without modifying files. Developers fix issues locally with:
      #   uv run ruff check . --fix
      #   uv run ruff format .
      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Mypy does static type checking. It catches bugs that tests miss,
      # like passing a str where an int is expected, or calling a method
      # that does not exist on a type.
      # We only check the core packages, not scripts/, because scripts tend
      # to have loose types that are fine for one-off tools.
      #- name: Mypy
       # run: uv run mypy #tokenizer/ model/ training/ inference/
       # continue-on-error: true
        # continue-on-error: true because mypy is strict and we are building
        # incrementally. We want to see mypy output without blocking merges
        # until the codebase is fully annotated. Remove this line once
        # mypy passes cleanly.

      # Pytest runs all tests in tests/.
      # We exclude tests that require the full corpus or a trained model
      # because CI does not have those files. Those tests are marked with
      # @pytest.mark.slow and skipped here.
      - name: Pytest
        run: uv run pytest tests/ -v --ignore=tests/test_integration.py -m "not slow"

      # Upload test results as an artifact so we can see them in the
      # GitHub Actions UI even when the job fails.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7
